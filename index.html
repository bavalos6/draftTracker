<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Athletics — NFL Fantasy Draft Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stadium: '#0F172A',
                        surface: '#1E293B',
                        surfaceHigh: '#334155',
                        actionOrange: '#FB923C',
                        skyTechnical: '#38BDF8',
                        crispWhite: '#F8FAFC',
                        surfaceDim: '#101415'
                    },
                    fontFamily: {
                        headline: ['Anton', 'sans-serif'],
                        body: ['Hanken Grotesk', 'sans-serif'],
                        monoStats: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        h1, h2, h3 { font-family: 'Anton', sans-serif; text-transform: uppercase; letter-spacing: 0.02em; }
        body { font-family: 'Hanken Grotesk', sans-serif; }
        .stats-font { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-stadium text-[#e0e3e5] min-h-screen p-6 antialiased">

    <div class="max-w-[1440px] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-6 mb-8 border-b border-surfaceHigh pb-5">
            <div>
                <h1 class="text-4xl md:text-5xl font-normal text-crispWhite tracking-wider">🏈 APEX ATHLETICS</h1>
                <p class="text-skyTechnical uppercase text-xs tracking-widest font-extrabold mt-1">DRAFT OPERATIONS // PERSONNEL MGMT</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-4">
                <button id="undoBtn" disabled class="px-5 py-2.5 bg-rose-600 hover:bg-rose-500 text-crispWhite disabled:opacity-30 rounded font-semibold text-sm uppercase tracking-wider transition">
                    Undo
                </button>
                <form id="userForm" class="flex gap-2">
                    <input id="userNameInput" type="text" placeholder="NEW MANAGER NAME" required class="bg-surfaceDim border border-surfaceHigh px-4 py-2.5 rounded text-sm focus:outline-none focus:border-actionOrange text-crispWhite uppercase font-semibold" />
                    <button type="submit" class="bg-actionOrange hover:bg-amber-400 text-stadium font-extrabold px-5 py-2.5 rounded text-sm uppercase tracking-wider transition">
                        Add Team
                    </button>
                </form>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 xl:col-span-3 bg-surface p-5 rounded-lg border border-surfaceHigh h-[calc(100vh-190px)] flex flex-col">
                <h2 class="text-xl text-crispWhite mb-4 flex justify-between items-baseline">
                    <span>Player Pool</span>
                    <span id="playerCount" class="text-actionOrange stats-font text-lg font-bold">(0)</span>
                </h2>
                <div class="space-y-3 mb-4">
                    <input id="searchInput" type="text" placeholder="Search..." class="w-full bg-surfaceDim border border-surfaceHigh px-4 py-2.5 rounded text-sm focus:outline-none focus:border-actionOrange text-crispWhite" />
                    <div class="flex flex-wrap gap-1" id="filterContainer">
                        <button data-pos="ALL" class="filter-btn px-3 py-1 rounded text-xs font-extrabold bg-actionOrange text-stadium">ALL</button>
                        <button data-pos="QB" class="filter-btn px-3 py-1 rounded text-xs font-extrabold bg-surfaceHigh">QB</button>
                        <button data-pos="RB" class="filter-btn px-3 py-1 rounded text-xs font-extrabold bg-surfaceHigh">RB</button>
                        <button data-pos="WR" class="filter-btn px-3 py-1 rounded text-xs font-extrabold bg-surfaceHigh">WR</button>
                        <button data-pos="TE" class="filter-btn px-3 py-1 rounded text-xs font-extrabold bg-surfaceHigh">TE</button>
                    </div>
                </div>
                <div id="playerPoolList" class="overflow-y-auto flex-1 pr-1 space-y-2"></div>
            </div>

            <div id="rosterGrid" class="lg:col-span-8 xl:col-span-9 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 auto-rows-start overflow-y-auto h-[calc(100vh-190px)] pr-1"></div>
        </div>
    </div>

    <script>
        let players = [
            { id: 1, name: "Christian McCaffrey", pos: "RB", team: "SF" },
            { id: 2, name: "CeeDee Lamb", pos: "WR", team: "DAL" },
            { id: 3, name: "Tyreek Hill", pos: "WR", team: "MIA" },
            { id: 4, name: "Justin Jefferson", pos: "WR", team: "MIN" },
            { id: 5, name: "Patrick Mahomes", pos: "QB", team: "KC" },
            { id: 6, name: "Josh Allen", pos: "QB", team: "BUF" },
            { id: 7, name: "Travis Kelce", pos: "TE", team: "KC" },
            { id: 8, name: "Breece Hall", pos: "RB", team: "NYJ" },
            { id: 9, name: "Amon-Ra St. Brown", pos: "WR", team: "DET" },
            { id: 10, name: "Lamar Jackson", pos: "QB", team: "BAL" }
        ];

        let users = [
            { id: Date.now(), name: "INITIAL MANAGER", roster: [] }
        ];

        let history = [];
        let currentFilter = "ALL";
        let currentSearch = "";

        const playerPoolList = document.getElementById('playerPoolList');
        const rosterGrid = document.getElementById('rosterGrid');
        const searchInput = document.getElementById('searchInput');
        const userForm = document.getElementById('userForm');
        const undoBtn = document.getElementById('undoBtn');

        function renderAll() {
            renderPlayers();
            renderRosters();
        }

        function renderPlayers() {
            playerPoolList.innerHTML = '';
            const filtered = players.filter(p => (p.name.toLowerCase().includes(currentSearch) || p.team.toLowerCase().includes(currentSearch)) && (currentFilter === "ALL" || p.pos === currentFilter));
            document.getElementById('playerCount').textContent = `(${filtered.length})`;
            filtered.forEach(player => {
                const card = document.createElement('div');
                card.className = "bg-surface p-3 rounded border border-surfaceHigh/60 cursor-grab flex justify-between items-center group transition hover:border-actionOrange";
                card.draggable = true;
                card.innerHTML = `<div><span class="font-semibold block text-crispWhite group-hover:text-actionOrange transition">${player.name}</span><span class="text-xs text-slate-400 stats-font uppercase">${player.team}</span></div><span class="text-xs font-extrabold px-2.5 py-1 bg-skyTechnical text-stadium stats-font">${player.pos}</span>`;
                card.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', player.id));
                playerPoolList.appendChild(card);
            });
        }

        function renderRosters() {
            rosterGrid.innerHTML = '';
            users.forEach(user => {
                const zone = document.createElement('div');
                zone.className = "bg-surface/40 border-2 border-dashed border-surfaceHigh/80 rounded-lg p-4 flex flex-col min-h-[240px]";
                
                const isOnlyUser = users.length === 1;

                zone.innerHTML = `
                    <div class="border-b border-surfaceHigh/80 pb-2 mb-3">
                        <div class="flex justify-between items-center mb-1">
                            <h3 class="text-lg text-crispWhite tracking-wide">${user.name}</h3>
                            <div class="flex gap-2">
                                <button onclick="editUser(${user.id})" class="text-[10px] font-bold text-skyTechnical hover:text-crispWhite uppercase transition">Edit</button>
                                ${!isOnlyUser ? `<button onclick="removeUser(${user.id})" class="text-[10px] font-bold text-rose-500 hover:text-crispWhite uppercase transition">Delete</button>` : ''}
                            </div>
                        </div>
                        <span class="text-[10px] font-bold text-actionOrange stats-font uppercase tracking-tighter">${user.roster.length} ASSETS DRAFTED</span>
                    </div>
                    <div class="space-y-2 flex-1" ondragover="event.preventDefault()" ondrop="handleDrop(event, ${user.id})">
                        ${user.roster.map((p, i) => `
                            <div class="bg-surface px-3 py-1.5 rounded border border-surfaceHigh/50 flex justify-between items-center text-xs group">
                                <span class="text-crispWhite"><span class="text-slate-500 mr-2">${i+1}</span>${p.name}</span>
                                <div class="flex items-center gap-3">
                                    <span class="stats-font text-skyTechnical font-bold uppercase">${p.pos}</span>
                                    <button onclick="releasePlayer(${user.id}, ${p.id})" class="opacity-0 group-hover:opacity-100 text-[10px] font-bold text-rose-500 hover:text-rose-400 uppercase transition-opacity">Remove</button>
                                </div>
                            </div>
                        `).join('') || '<div class="h-24 flex items-center justify-center text-slate-600 font-extrabold text-[10px] uppercase tracking-widest text-center">Ready for Personnel Input</div>'}
                    </div>
                `;
                rosterGrid.appendChild(zone);
            });
        }

        function releasePlayer(userId, playerId) {
            saveHistory();
            const user = users.find(u => u.id === userId);
            const playerIndex = user.roster.findIndex(p => p.id === playerId);
            const [player] = user.roster.splice(playerIndex, 1);
            players.push(player);
            // Sort players for consistent pool view
            players.sort((a, b) => a.id - b.id);
            renderAll();
        }

        function handleDrop(e, userId) {
            e.preventDefault();
            const playerId = parseInt(e.dataTransfer.getData('text/plain'));
            const playerIndex = players.findIndex(p => p.id === playerId);
            if (playerIndex !== -1) {
                saveHistory();
                const [player] = players.splice(playerIndex, 1);
                users.find(u => u.id === userId).roster.push(player);
                renderAll();
            }
        }

        function editUser(id) {
            const user = users.find(u => u.id === id);
            const newName = prompt("Enter new name for " + user.name + ":", user.name);
            if (newName && newName.trim()) {
                saveHistory();
                user.name = newName.trim().toUpperCase();
                renderAll();
            }
        }

        function removeUser(id) {
            if (users.length <= 1) return;
            if (confirm("Are you sure you want to remove this manager? Any drafted players will be returned to the pool.")) {
                saveHistory();
                const userIndex = users.findIndex(u => u.id === id);
                const [removedUser] = users.splice(userIndex, 1);
                players = [...players, ...removedUser.roster];
                players.sort((a, b) => a.id - b.id);
                renderAll();
            }
        }

        function saveHistory() {
            history.push({ players: JSON.parse(JSON.stringify(players)), users: JSON.parse(JSON.stringify(users)) });
            undoBtn.disabled = false;
        }

        userForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('userNameInput').value.trim().toUpperCase();
            if (name) {
                saveHistory();
                users.push({ id: Date.now(), name, roster: [] });
                document.getElementById('userNameInput').value = '';
                renderAll();
            }
        });

        undoBtn.addEventListener('click', () => {
            if (history.length > 0) {
                const prev = history.pop();
                players = prev.players;
                users = prev.users;
                if (history.length === 0) undoBtn.disabled = true;
                renderAll();
            }
        });

        searchInput.addEventListener('input', (e) => { currentSearch = e.target.value.toLowerCase(); renderPlayers(); });
        document.getElementById('filterContainer').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.replace('bg-actionOrange', 'bg-surfaceHigh'));
                e.target.classList.replace('bg-surfaceHigh', 'bg-actionOrange');
                currentFilter = e.target.dataset.pos;
                renderPlayers();
            }
        });

        renderAll();
    </script>
</body>
</html>
