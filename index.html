<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Athletics — NFL 2026-2027 Live Draft Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stadium: '#0F172A', surface: '#1E293B', surfaceHigh: '#334155',
                        actionOrange: '#FB923C', skyTechnical: '#38BDF8', crispWhite: '#F8FAFC', surfaceDim: '#101415'
                    },
                    fontFamily: {
                        headline: ['Anton', 'sans-serif'],
                        body: ['Hanken Grotesk', 'sans-serif'],
                        monoStats: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        h1, h2, h3 { font-family: 'Anton', sans-serif; text-transform: uppercase; letter-spacing: 0.02em; }
        body { font-family: 'Hanken Grotesk', sans-serif; }
        .stats-font { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .loading-shimmer { background: linear-gradient(90deg, #1E293B 25%, #334155 50%, #1E293B 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-stadium text-[#e0e3e5] min-h-screen p-6 antialiased">

    <div class="max-w-[1440px] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-6 mb-8 border-b border-surfaceHigh pb-5">
            <div>
                <h1 class="text-4xl md:text-5xl font-normal text-crispWhite tracking-wider">🏈 APEX ATHLETICS</h1>
                <p id="apiStatus" class="text-skyTechnical uppercase text-xs tracking-widest font-extrabold mt-1">FETCHING 2026-2027 ROSTERS...</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-4">
                <button id="undoBtn" disabled class="px-5 py-2.5 bg-rose-600 hover:bg-rose-500 text-crispWhite disabled:opacity-30 rounded font-semibold text-sm uppercase tracking-wider transition">Undo</button>
                <form id="userForm" class="flex gap-2">
                    <input id="userNameInput" type="text" placeholder="MANAGER NAME" required class="bg-surfaceDim border border-surfaceHigh px-4 py-2.5 rounded text-sm focus:outline-none focus:border-actionOrange text-crispWhite uppercase font-semibold" />
                    <button type="submit" class="bg-actionOrange hover:bg-amber-400 text-stadium font-extrabold px-5 py-2.5 rounded text-sm uppercase tracking-wider transition">Add Team</button>
                </form>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 xl:col-span-3 bg-surface p-5 rounded-lg border border-surfaceHigh h-[calc(100vh-190px)] flex flex-col">
                <h2 class="text-xl text-crispWhite mb-4 flex justify-between items-baseline">
                    <span>Player Pool</span>
                    <span id="playerCount" class="text-actionOrange stats-font text-lg font-bold">---</span>
                </h2>
                
                <div class="space-y-3 mb-4">
                    <input id="searchInput" type="text" placeholder="Search name or team (e.g. SEA)..." class="w-full bg-surfaceDim border border-surfaceHigh px-4 py-2.5 rounded text-sm focus:outline-none focus:border-actionOrange text-crispWhite" />
                    <div class="flex flex-wrap gap-1" id="filterContainer">
                        <button data-pos="ALL" class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-actionOrange text-stadium">ALL</button>
                        <button data-pos="QB" class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">QB</button>
                        <button data-pos="RB" class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">RB</button>
                        <button data-pos="WR" class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">WR</button>
                        <button data-pos="TE" class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">TE</button>
                        <button data-pos="K" class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">K</button>
                        <button data-pos="DEF" class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">DEF</button>
                    </div>
                </div>

                <div id="playerPoolList" class="overflow-y-auto flex-1 pr-1 space-y-2">
                    <div class="loading-shimmer h-12 rounded mb-2"></div>
                    <div class="loading-shimmer h-12 rounded mb-2"></div>
                    <div class="loading-shimmer h-12 rounded mb-2"></div>
                </div>
            </div>

            <div id="rosterGrid" class="lg:col-span-8 xl:col-span-9 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 auto-rows-start overflow-y-auto h-[calc(100vh-190px)] pr-1"></div>
        </div>
    </div>

    <script>
        let players = [];
        let users = [{ id: Date.now(), name: "INITIAL MANAGER", roster: [] }];
        let history = [];
        let currentFilter = "ALL";
        let currentSearch = "";

        // UI Selectors
        const poolList = document.getElementById('playerPoolList');
        const rosterGrid = document.getElementById('rosterGrid');
        const statusText = document.getElementById('apiStatus');

        // Fetch Live 2026 Data from Sleeper API
        async function load2026Data() {
            try {
                const response = await fetch('https://api.sleeper.app/v1/players/nfl');
                const data = await response.json();
                
                // Process and filter for Fantasy-relevant active players only
                players = Object.values(data)
                    .filter(p => p.active && ["QB", "RB", "WR", "TE", "K", "DEF"].includes(p.position))
                    .map(p => ({
                        id: p.player_id,
                        name: p.full_name || `${p.first_name} ${p.last_name}`,
                        pos: p.position,
                        team: p.team || "FA"
                    }))
                    .sort((a, b) => a.name.localeCompare(b.name));

                statusText.innerText = "2026-2027 SYSTEM READY // LIVE DATA SYNCED";
                statusText.classList.replace('text-skyTechnical', 'text-emerald-400');
                renderAll();
            } catch (err) {
                statusText.innerText = "CONNECTION ERROR // USING OFFLINE CACHE";
                statusText.classList.replace('text-skyTechnical', 'text-rose-500');
                console.error(err);
            }
        }

        function renderAll() {
            renderPlayers();
            renderRosters();
        }

        function renderPlayers() {
            poolList.innerHTML = '';
            const filtered = players.filter(p => 
                (p.name.toLowerCase().includes(currentSearch) || p.team.toLowerCase().includes(currentSearch)) && 
                (currentFilter === "ALL" || p.pos === currentFilter)
            ).slice(0, 100); // UI Performance limit

            document.getElementById('playerCount').textContent = `(${players.length})`;

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-surface p-3 rounded border border-surfaceHigh/60 cursor-grab flex justify-between items-center group transition hover:border-actionOrange";
                card.draggable = true;
                card.innerHTML = `
                    <div>
                        <span class="font-semibold block text-crispWhite group-hover:text-actionOrange transition">${p.name}</span>
                        <span class="text-[10px] text-slate-400 stats-font uppercase tracking-widest">${p.team}</span>
                    </div>
                    <span class="text-[10px] font-extrabold px-2 py-1 bg-skyTechnical text-stadium stats-font">${p.pos}</span>
                `;
                card.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', p.id));
                poolList.appendChild(card);
            });
        }

        function renderRosters() {
            rosterGrid.innerHTML = '';
            users.forEach(user => {
                const zone = document.createElement('div');
                zone.className = "bg-surface/40 border-2 border-dashed border-surfaceHigh/80 rounded-lg p-4 flex flex-col min-h-[260px]";
                zone.innerHTML = `
                    <div class="border-b border-surfaceHigh/80 pb-2 mb-3 flex justify-between items-start">
                        <div>
                            <h3 class="text-lg text-crispWhite">${user.name}</h3>
                            <button onclick="editUser(${user.id})" class="text-[9px] font-bold text-skyTechnical uppercase">Edit Name</button>
                        </div>
                        ${users.length > 1 ? `<button onclick="removeUser(${user.id})" class="text-rose-500 text-[9px] font-bold uppercase">Delete</button>` : ''}
                    </div>
                    <div class="space-y-2 flex-1" ondragover="event.preventDefault()" ondrop="handleDrop(event, ${user.id})">
                        ${user.roster.map(p => `
                            <div class="bg-surface px-3 py-2 rounded border border-surfaceHigh/50 flex justify-between items-center text-xs group">
                                <span class="text-crispWhite font-semibold">${p.name}</span>
                                <div class="flex items-center gap-2">
                                    <span class="stats-font text-skyTechnical font-bold text-[10px]">${p.pos}</span>
                                    <button onclick="releasePlayer(${user.id}, '${p.id}')" class="opacity-0 group-hover:opacity-100 text-rose-500 font-bold transition">✕</button>
                                </div>
                            </div>
                        `).join('') || '<div class="h-32 flex items-center justify-center text-slate-700 text-[10px] uppercase font-bold text-center">Drag Player to Field</div>'}
                    </div>
                `;
                rosterGrid.appendChild(zone);
            });
        }

        function handleDrop(e, userId) {
            e.preventDefault();
            const pid = e.dataTransfer.getData('text/plain');
            const idx = players.findIndex(p => p.id === pid);
            if (idx !== -1) {
                saveHistory();
                const [player] = players.splice(idx, 1);
                users.find(u => u.id === userId).roster.push(player);
                renderAll();
            }
        }

        function releasePlayer(userId, playerId) {
            saveHistory();
            const user = users.find(u => u.id === userId);
            const idx = user.roster.findIndex(p => p.id === playerId);
            const [player] = user.roster.splice(idx, 1);
            players.push(player);
            players.sort((a, b) => a.name.localeCompare(b.name));
            renderAll();
        }

        function saveHistory() {
            history.push({ players: JSON.parse(JSON.stringify(players)), users: JSON.parse(JSON.stringify(users)) });
            document.getElementById('undoBtn').disabled = false;
        }

        // Global Event Handlers
        document.getElementById('userForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const val = document.getElementById('userNameInput').value.trim().toUpperCase();
            if (val) {
                saveHistory();
                users.push({ id: Date.now(), name: val, roster: [] });
                document.getElementById('userNameInput').value = '';
                renderAll();
            }
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderPlayers();
        });

        document.getElementById('filterContainer').addEventListener('click', (e) => {
            if (e.target.dataset.pos) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.replace('bg-actionOrange', 'bg-surfaceHigh'));
                e.target.classList.replace('bg-surfaceHigh', 'bg-actionOrange');
                currentFilter = e.target.dataset.pos;
                renderPlayers();
            }
        });

        load2026Data();
    </script>
</body>
</html>
