<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Athletics — NFL 2026-2027 Live Draft Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stadium: '#0F172A', surface: '#1E293B', surfaceHigh: '#334155',
                        actionOrange: '#FB923C', skyTechnical: '#38BDF8', crispWhite: '#F8FAFC', surfaceDim: '#101415'
                    },
                    fontFamily: {
                        headline: ['Anton', 'sans-serif'],
                        body: ['Hanken Grotesk', 'sans-serif'],
                        monoStats: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        h1,
        h2,
        h3 {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        body {
            font-family: 'Hanken Grotesk', sans-serif;
        }

        .stats-font {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0F172A;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #1E293B 25%, #334155 50%, #1E293B 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Player headshot image */
        .player-thumb {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            object-position: top center;
            background: #334155;
            flex-shrink: 0;
            border: 2px solid #334155;
        }

        .player-thumb.def-thumb {
            object-position: center;
            border-radius: 6px;
        }

        /* Smaller thumb for roster cards */
        .roster-thumb {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            object-position: top center;
            background: #334155;
            flex-shrink: 0;
            border: 1.5px solid #334155;
        }
    </style>
</head>

<body class="bg-stadium text-[#e0e3e5] min-h-screen p-6 antialiased">

    <div class="max-w-[1440px] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-6 mb-8 border-b border-surfaceHigh pb-5">
            <div>
                <h1 class="text-4xl md:text-5xl font-normal text-crispWhite tracking-wider">FORTNITOS FANTASY</h1>
                <p id="apiStatus" class="text-skyTechnical uppercase text-xs tracking-widest font-extrabold mt-1">
                    FETCHING 2026-2027 ROSTERS...</p>
            </div>

            <div class="flex flex-wrap items-center gap-4">
                <button id="undoBtn" disabled
                    class="px-5 py-2.5 bg-rose-600 hover:bg-rose-500 text-crispWhite disabled:opacity-30 rounded font-semibold text-sm uppercase tracking-wider transition">Undo</button>
                <form id="userForm" class="flex gap-2">
                    <input id="userNameInput" type="text" placeholder="MANAGER NAME" required
                        class="bg-surfaceDim border border-surfaceHigh px-4 py-2.5 rounded text-sm focus:outline-none focus:border-actionOrange text-crispWhite uppercase font-semibold" />
                    <button type="submit"
                        class="bg-actionOrange hover:bg-amber-400 text-stadium font-extrabold px-5 py-2.5 rounded text-sm uppercase tracking-wider transition">Add
                        Team</button>
                </form>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div
                class="lg:col-span-4 xl:col-span-3 bg-surface p-5 rounded-lg border border-surfaceHigh h-[calc(100vh-190px)] flex flex-col">
                <h2 class="text-xl text-crispWhite mb-4 flex justify-between items-baseline">
                    <span>Player Pool</span>
                    <span id="playerCount" class="text-actionOrange stats-font text-lg font-bold">---</span>
                </h2>

                <div class="space-y-3 mb-4">
                    <input id="searchInput" type="text" placeholder="Search name or team (e.g. SEA)..."
                        class="w-full bg-surfaceDim border border-surfaceHigh px-4 py-2.5 rounded text-sm focus:outline-none focus:border-actionOrange text-crispWhite" />
                    <div class="flex flex-wrap gap-1" id="filterContainer">
                        <button data-pos="ALL"
                            class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-actionOrange text-stadium">ALL</button>
                        <button data-pos="QB"
                            class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">QB</button>
                        <button data-pos="RB"
                            class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">RB</button>
                        <button data-pos="WR"
                            class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">WR</button>
                        <button data-pos="TE"
                            class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">TE</button>
                        <button data-pos="K"
                            class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">K</button>
                        <button data-pos="DEF"
                            class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">DEF</button>
                        <button data-pos="DL"
                            class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">DL</button>
                        <button data-pos="LB"
                            class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">LB</button>
                        <button data-pos="DB"
                            class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">DB</button>
                    </div>
                </div>

                <div id="playerPoolList" class="overflow-y-auto flex-1 pr-1 space-y-2">
                    <div class="loading-shimmer h-14 rounded mb-2"></div>
                    <div class="loading-shimmer h-14 rounded mb-2"></div>
                    <div class="loading-shimmer h-14 rounded mb-2"></div>
                </div>
            </div>

            <div id="rosterGrid"
                class="lg:col-span-8 xl:col-span-9 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 auto-rows-start overflow-y-auto h-[calc(100vh-190px)] pr-1">
            </div>
        </div>
    </div>

    <script>
        let isMobile = window.innerWidth < 1024;
        window.addEventListener('resize', () => { isMobile = window.innerWidth < 1024; renderAll(); });

        let players = [];
        let users = [{ id: Date.now(), name: "INITIAL MANAGER", roster: [] }];
        let history = [];
        let currentFilter = "ALL";
        let currentSearch = "";

        const poolList = document.getElementById('playerPoolList');
        const rosterGrid = document.getElementById('rosterGrid');
        const statusText = document.getElementById('apiStatus');

        // --- Headshot helpers ---
        // Sleeper CDN: thumb images for individual players, team logo for DEF
        function getThumbUrl(player) {
            if (player.pos === 'DEF') {
                return `https://sleepercdn.com/images/team_logos/nfl/${player.team.toLowerCase()}.jpg`;
            }
            return `https://sleepercdn.com/content/nfl/players/thumb/${player.id}.jpg`;
        }
        // Fallback placeholder as SVG data URI showing initials
        function getFallbackUrl(player) {
            const initials = player.name.split(' ').map(w => w[0]).slice(0, 2).join('');
            return `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'><rect width='40' height='40' rx='20' fill='%23334155'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='14' font-weight='700' fill='%2338BDF8'>${encodeURIComponent(initials)}</text></svg>`;
        }

        function imgTag(player, cls = 'player-thumb') {
            const isDef = player.pos === 'DEF';
            const defClass = isDef ? ' def-thumb' : '';
            return `<img src="${getThumbUrl(player)}" class="${cls}${defClass}" alt="${player.name}" onerror="this.src='${getFallbackUrl(player)}'; this.onerror=null;" loading="lazy" />`;
        }

        // --- Data load ---
        async function load2026Data() {
            try {
                const response = await fetch('https://api.sleeper.app/v1/players/nfl');
                const data = await response.json();

                // Added DL, LB, DB for Individual Defensive Players
                const validPositions = ["QB", "RB", "WR", "TE", "K", "DEF", "DL", "LB", "DB"];

                players = Object.values(data)
                    .filter(p => p.active && validPositions.includes(p.position))
                    .map(p => ({
                        id: p.player_id,
                        name: p.full_name || `${p.first_name} ${p.last_name}`,
                        pos: p.position,
                        team: p.team || "FA"
                    }))
                    .sort((a, b) => a.name.localeCompare(b.name));

                statusText.innerText = "2026-2027 SYSTEM READY // LIVE DATA SYNCED";
                statusText.classList.replace('text-skyTechnical', 'text-emerald-400');
                renderAll();
            } catch (err) {
                statusText.innerText = "CONNECTION ERROR // CHECK CONSOLE";
                statusText.classList.replace('text-skyTechnical', 'text-rose-500');
                console.error("Data Load Error:", err);
            }
        }

        function renderAll() { renderPlayers(); renderRosters(); }

        function renderPlayers() {
            poolList.innerHTML = '';
            const filtered = players.filter(p =>
                (p.name.toLowerCase().includes(currentSearch) || p.team.toLowerCase().includes(currentSearch)) &&
                (currentFilter === "ALL" || p.pos === currentFilter)
            ).slice(0, 100);

            document.getElementById('playerCount').textContent = `(${players.length})`;

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-surface p-2.5 rounded border border-surfaceHigh/60 flex items-center gap-3 group transition active:bg-surfaceHigh";

                if (!isMobile) {
                    card.draggable = true;
                    card.classList.add('cursor-grab');
                    card.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', p.id));
                }

                card.innerHTML = `
                    ${imgTag(p, 'player-thumb')}
                    <div class="flex-1 min-w-0">
                        <span class="font-semibold block text-crispWhite text-sm truncate">${p.name}</span>
                        <span class="text-[10px] text-slate-400 stats-font uppercase tracking-widest">${p.team}</span>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <span class="text-[10px] font-extrabold px-2 py-1 bg-skyTechnical text-stadium stats-font">${p.pos}</span>
                        ${isMobile ? `<button onclick="showMobilePicker('${p.id}')" class="w-10 h-10 flex items-center justify-center bg-actionOrange text-stadium rounded-full shadow-lg">
                            <span class="text-xl font-bold">+</span>
                        </button>` : ''}
                    </div>
                `;
                poolList.appendChild(card);
            });
        }

        // Mobile picker
        function showMobilePicker(playerId) {
            const player = players.find(p => p.id === playerId);
            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 bg-stadium/90 backdrop-blur-sm z-[100] flex flex-col p-6 items-center justify-center";
            overlay.id = "mobilePicker";

            overlay.innerHTML = `
                <div class="w-full max-w-sm bg-surface p-6 rounded-xl border border-actionOrange shadow-2xl">
                    <div class="flex items-center gap-4 mb-4">
                        ${imgTag(player, 'player-thumb')}
                        <div>
                            <h3 class="text-xl text-crispWhite">Draft ${player.name}</h3>
                            <p class="text-xs text-slate-400 uppercase tracking-widest">${player.pos} · ${player.team}</p>
                        </div>
                    </div>
                    <p class="text-xs text-slate-400 uppercase tracking-widest mb-4">Select Destination Manager</p>
                    <div class="space-y-3 max-h-[60vh] overflow-y-auto">
                        ${users.map(u => `
                            <button onclick="mobileDraft('${player.id}', ${u.id})" class="w-full p-4 bg-surfaceHigh text-crispWhite font-bold rounded-lg text-left hover:bg-actionOrange hover:text-stadium transition">
                                ${u.name}
                            </button>
                        `).join('')}
                    </div>
                    <button onclick="document.getElementById('mobilePicker').remove()" class="w-full mt-6 py-3 text-rose-500 font-bold uppercase tracking-widest">Cancel</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function mobileDraft(playerId, userId) {
            const idx = players.findIndex(p => p.id === playerId);
            if (idx !== -1) {
                saveHistory();
                const [player] = players.splice(idx, 1);
                users.find(u => u.id === userId).roster.push(player);
                document.getElementById('mobilePicker').remove();
                renderAll();
            }
        }

        function renderRosters() {
            rosterGrid.innerHTML = '';
            users.forEach(user => {
                const zone = document.createElement('div');
                zone.className = "bg-surface/40 border-2 border-dashed border-surfaceHigh/80 rounded-lg p-4 flex flex-col h-full min-h-[350px]";

                zone.innerHTML = `
                    <div class="border-b border-surfaceHigh/80 pb-2 mb-3 flex justify-between items-start flex-none">
                        <div>
                            <h3 class="text-lg text-crispWhite">${user.name}</h3>
                            <button onclick="editUser(${user.id})" class="text-[9px] font-bold text-skyTechnical uppercase">Edit Name</button>
                        </div>
                        ${users.length > 1 ? `<button onclick="removeUser(${user.id})" class="text-rose-500 text-[9px] font-bold uppercase">Delete</button>` : ''}
                    </div>

                    <div class="space-y-1.5 overflow-y-auto pr-1 flex-1 max-h-[300px] custom-scrollbar"
                        ondragover="event.preventDefault()" ondrop="handleDrop(event, ${user.id})">
                        ${user.roster.map(p => `
                            <div class="bg-surface px-2.5 py-1.5 rounded border border-surfaceHigh/50 flex items-center gap-2 text-xs group">
                                <img
                                    src="${getThumbUrl(p)}"
                                    class="roster-thumb${p.pos === 'DEF' ? ' rounded' : ''}"
                                    alt="${p.name}"
                                    onerror="this.src='${getFallbackUrl(p)}'; this.onerror=null;"
                                    loading="lazy"
                                />
                                <span class="text-crispWhite font-semibold flex-1 truncate">${p.name}</span>
                                <div class="flex items-center gap-1.5 flex-shrink-0">
                                    <span class="stats-font text-skyTechnical font-bold text-[10px]">${p.pos}</span>
                                    <button onclick="releasePlayer(${user.id}, '${p.id}')" class="opacity-0 group-hover:opacity-100 text-rose-500 font-bold transition">✕</button>
                                </div>
                            </div>
                        `).join('') || '<div class="h-32 flex items-center justify-center text-slate-700 text-[10px] uppercase font-bold text-center">Drag Player to Field</div>'}
                    </div>

                    <div class="mt-3 pt-2 border-t border-surfaceHigh/40 flex-none">
                        <span class="text-[10px] font-bold text-actionOrange stats-font uppercase">${user.roster.length} Assets Drafted</span>
                    </div>
                `;
                rosterGrid.appendChild(zone);
            });
        }

        function handleDrop(e, userId) {
            e.preventDefault();
            const pid = e.dataTransfer.getData('text/plain');
            const idx = players.findIndex(p => p.id === pid);
            if (idx !== -1) {
                saveHistory();
                const [player] = players.splice(idx, 1);
                users.find(u => u.id === userId).roster.push(player);
                renderAll();
            }
        }

        function releasePlayer(userId, playerId) {
            saveHistory();
            const user = users.find(u => u.id === userId);
            const idx = user.roster.findIndex(p => p.id === playerId);
            const [player] = user.roster.splice(idx, 1);
            players.push(player);
            players.sort((a, b) => a.name.localeCompare(b.name));
            renderAll();
        }

        function saveHistory() {
            history.push({ players: JSON.parse(JSON.stringify(players)), users: JSON.parse(JSON.stringify(users)) });
            document.getElementById('undoBtn').disabled = false;
        }

        function editUser(id) {
            const user = users.find(u => u.id === id);
            const newName = prompt("Enter new name for " + user.name + ":", user.name);
            if (newName && newName.trim()) {
                saveHistory();
                user.name = newName.trim().toUpperCase();
                renderAll();
            }
        }

        function removeUser(id) {
            if (users.length <= 1) return;
            if (confirm("Are you sure you want to remove this manager? Any drafted players will be returned to the pool.")) {
                saveHistory();
                const userIndex = users.findIndex(u => u.id === id);
                const [removedUser] = users.splice(userIndex, 1);
                players = [...players, ...removedUser.roster];
                players.sort((a, b) => a.id - b.id);
                renderAll();
            }
        }

        document.getElementById('userForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const val = document.getElementById('userNameInput').value.trim().toUpperCase();
            if (val) {
                saveHistory();
                users.push({ id: Date.now(), name: val, roster: [] });
                document.getElementById('userNameInput').value = '';
                renderAll();
            }
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderPlayers();
        });

        document.getElementById('filterContainer').addEventListener('click', (e) => {
            if (e.target.dataset.pos) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.replace('bg-actionOrange', 'bg-surfaceHigh'));
                e.target.classList.replace('bg-surfaceHigh', 'bg-actionOrange');
                currentFilter = e.target.dataset.pos;
                renderPlayers();
            }
        });

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (history.length > 0) {
                const prev = history.pop();
                players = prev.players;
                users = prev.users;
                if (history.length === 0) document.getElementById('undoBtn').disabled = true;
                renderAll();
            }
        });

        load2026Data();
    </script>
</body>

</html>
