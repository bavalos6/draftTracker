<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Person NFL Fantasy Draft Board</title>
    <!-- Tailwind Play CDN works perfectly fine on GitHub Pages -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6 selection:bg-amber-500 selection:text-slate-900">

    <div class="max-w-7xl mx-auto">
        <!-- Header Actions -->
        <header class="flex flex-wrap justify-between items-center gap-4 mb-8 border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-extrabold text-amber-400">🏈 Offline Draft Board</h1>
                <p class="text-slate-400 text-sm">Drag players onto team rosters to draft them.</p>
            </div>
            <div class="flex items-center gap-4">
                <button id="undoBtn" disabled class="px-4 py-2 bg-rose-600 hover:bg-rose-500 disabled:opacity-40 disabled:cursor-not-allowed rounded-lg font-medium transition">
                    Undo Last Pick
                </button>
                <form id="userForm" class="flex gap-2">
                    <input id="userNameInput" type="text" placeholder="Add Manager Name" required class="bg-slate-800 border border-slate-700 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-amber-400 text-white" />
                    <button type="submit" class="bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold px-4 py-2 rounded-lg text-sm transition">
                        + Add Team
                    </button>
                </form>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Player Pool -->
            <div class="lg:col-span-1 bg-slate-800/50 p-4 rounded-xl border border-slate-700 h-[calc(100vh-180px)] flex flex-col">
                <h2 class="text-xl font-bold mb-4 flex justify-between">
                    <span>Available Players</span>
                    <span id="playerCount" class="text-amber-400 font-mono">(0)</span>
                </h2>
                
                <!-- Search & Filter Controls -->
                <div class="space-y-2 mb-4">
                    <input id="searchInput" type="text" placeholder="Search by name or team..." class="w-full bg-slate-800 border border-slate-700 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-amber-400 text-white" />
                    <div class="flex flex-wrap gap-1" id="filterContainer">
                        <button data-pos="ALL" class="filter-btn px-2.5 py-1 rounded text-xs font-semibold uppercase tracking-wider bg-amber-500 text-slate-900">ALL</button>
                        <button data-pos="QB" class="filter-btn px-2.5 py-1 rounded text-xs font-semibold uppercase tracking-wider bg-slate-700 hover:bg-slate-600">QB</button>
                        <button data-pos="RB" class="filter-btn px-2.5 py-1 rounded text-xs font-semibold uppercase tracking-wider bg-slate-700 hover:bg-slate-600">RB</button>
                        <button data-pos="WR" class="filter-btn px-2.5 py-1 rounded text-xs font-semibold uppercase tracking-wider bg-slate-700 hover:bg-slate-600">WR</button>
                        <button data-pos="TE" class="filter-btn px-2.5 py-1 rounded text-xs font-semibold uppercase tracking-wider bg-slate-700 hover:bg-slate-600">TE</button>
                    </div>
                </div>

                <!-- Draggable List Wrapper -->
                <div id="playerPoolList" class="overflow-y-auto flex-1 pr-1 space-y-2"></div>
            </div>

            <!-- Right Columns: Team Rosters (Drop Zones) -->
            <div id="rosterGrid" class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4 auto-rows-start overflow-y-auto h-[calc(100vh-180px)] pr-1"></div>
        </div>
    </div>

    <script>
        // Data States
        let players = [
            { id: 1, name: "Christian McCaffrey", pos: "RB", team: "SF" },
            { id: 2, name: "CeeDee Lamb", pos: "WR", team: "DAL" },
            { id: 3, name: "Tyreek Hill", pos: "WR", team: "MIA" },
            { id: 4, name: "Justin Jefferson", pos: "WR", team: "MIN" },
            { id: 5, name: "Patrick Mahomes", pos: "QB", team: "KC" },
            { id: 6, name: "Josh Allen", pos: "QB", team: "BUF" },
            { id: 7, name: "Travis Kelce", pos: "TE", team: "KC" },
            { id: 8, name: "Breece Hall", pos: "RB", team: "NYJ" },
            { id: 9, name: "Amon-Ra St. Brown", pos: "WR", team: "DET" },
            { id: 10, name: "Lamar Jackson", pos: "QB", team: "BAL" },
            { id: 11, name: "Saquon Barkley", pos: "RB", team: "PHI" },
            { id: 12, name: "Sam LaPorta", pos: "TE", team: "DET" }
        ];

        let users = [
            { id: 1, name: "Manager 1", roster: [] },
            { id: 2, name: "Manager 2", roster: [] }
        ];

        let history = [];
        let currentFilter = "ALL";
        let currentSearch = "";

        // DOM Elements
        const playerPoolList = document.getElementById('playerPoolList');
        const rosterGrid = document.getElementById('rosterGrid');
        const playerCount = document.getElementById('playerCount');
        const searchInput = document.getElementById('searchInput');
        const userForm = document.getElementById('userForm');
        const userNameInput = document.getElementById('userNameInput');
        const undoBtn = document.getElementById('undoBtn');

        // Save state snapshot for Undos
        function saveHistory() {
            history.push({
                players: JSON.parse(JSON.stringify(players)),
                users: JSON.parse(JSON.stringify(users))
            });
            undoBtn.disabled = false;
        }

        // Render functions
        function renderAll() {
            renderPlayers();
            renderRosters();
        }

        function renderPlayers() {
            playerPoolList.innerHTML = '';
            
            const filtered = players.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(currentSearch) || p.team.toLowerCase().includes(currentSearch);
                const matchesPos = currentFilter === "ALL" || p.pos === currentFilter;
                return matchesSearch && matchesPos;
            });

            playerCount.textContent = `(${filtered.length})`;

            if (filtered.length === 0) {
                playerPoolList.innerHTML = `<p class="text-center text-slate-500 text-sm mt-8">No available players found.</p>`;
                return;
            }

            filtered.forEach(player => {
                const card = document.createElement('div');
                card.className = "bg-slate-800 p-3 rounded-lg border border-slate-700 cursor-grab active:cursor-grabbing hover:border-amber-500/50 transition flex justify-between items-center group";
                card.draggable = true;
                card.dataset.id = player.id;
                
                card.innerHTML = `
                    <div>
                        <span class="font-bold block group-hover:text-amber-400 transition">${player.name}</span>
                        <span class="text-xs text-slate-400 font-mono uppercase">${player.team}</span>
                    </div>
                    <span class="text-xs font-bold px-2 py-1 rounded bg-slate-700 text-slate-300">${player.pos}</span>
                `;

                card.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', player.id);
                });

                playerPoolList.appendChild(card);
            });
        }

        function renderRosters() {
            rosterGrid.innerHTML = '';
            
            users.forEach(user => {
                const zone = document.createElement('div');
                zone.className = "bg-slate-800/30 border-2 border-dashed border-slate-700 hover:border-amber-500/50 rounded-xl p-4 transition min-h-[220px] flex flex-col";
                
                let rosterItemsHTML = user.roster.map((player, idx) => `
                    <div class="bg-slate-800 px-3 py-1.5 rounded border border-slate-700 flex justify-between items-center text-sm">
                        <span><span class="text-slate-500 font-mono mr-2">${idx + 1}.</span>${player.name}</span>
                        <span class="text-xs font-mono text-slate-400 uppercase">${player.pos} - ${player.team}</span>
                    </div>
                `).join('');

                if (user.roster.length === 0) {
                    rosterItemsHTML = `<div class="h-full flex items-center justify-center text-slate-600 text-xs py-8 pointer-events-none">Drop player here to draft</div>`;
                }

                zone.innerHTML = `
                    <h3 class="font-bold border-b border-slate-700 pb-2 mb-2 flex justify-between text-slate-200">
                        <span>${user.name}</span>
                        <span class="text-xs text-slate-400 font-normal">${user.roster.length} players</span>
                    </h3>
                    <div class="space-y-1.5 flex-1 layout-zone">${rosterItemsHTML}</div>
                `;

                // Drag over behaviors
                zone.addEventListener('dragover', (e) => e.preventDefault());
                
                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const playerId = parseInt(e.dataTransfer.getData('text/plain'), 10);
                    const playerIndex = players.findIndex(p => p.id === playerId);
                    
                    if (playerIndex !== -1) {
                        saveHistory();
                        const [player] = players.splice(playerIndex, 1);
                        user.roster.push(player);
                        renderAll();
                    }
                });

                rosterGrid.appendChild(zone);
            });
        }

        // Setup Event Listeners
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderPlayers();
        });

        document.getElementById('filterContainer').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('bg-amber-500', 'text-slate-900');
                    btn.classList.add('bg-slate-700', 'text-slate-300', 'hover:bg-slate-600');
                });
                e.target.classList.remove('bg-slate-700', 'text-slate-300', 'hover:bg-slate-600');
                e.target.className += ' bg-amber-500 text-slate-900';
                
                currentFilter = e.target.dataset.pos;
                renderPlayers();
            }
        });

        userForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = userNameInput.value.trim();
            if (name) {
                users.push({ id: Date.now(), name: name, roster: [] });
                userNameInput.value = '';
                renderRosters();
            }
        });

        undoBtn.addEventListener('click', () => {
            if (history.length > 0) {
                const previous = history.pop();
                players = previous.players;
                users = previous.users;
                if (history.length === 0) undoBtn.disabled = true;
                renderAll();
            }
        });

        // Initialize App
        renderAll();
    </script>
</body>
</html>
