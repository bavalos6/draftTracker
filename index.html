<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORTNITOS FANTASY — NFL 2026-2027 Live Draft Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stadium: '#0F172A', surface: '#1E293B', surfaceHigh: '#334155',
                        actionOrange: '#FB923C', skyTechnical: '#38BDF8', crispWhite: '#F8FAFC', surfaceDim: '#101415'
                    },
                    fontFamily: {
                        headline: ['Anton', 'sans-serif'],
                        body: ['Hanken Grotesk', 'sans-serif'],
                        monoStats: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        h1,
        h2,
        h3 {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        body {
            font-family: 'Hanken Grotesk', sans-serif;
        }

        .stats-font {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0F172A;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #1E293B 25%, #334155 50%, #1E293B 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        .thumb-placeholder {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1E293B;
            border: 2px solid #334155;
            flex-shrink: 0;
        }

        .thumb-placeholder.sz40 {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .thumb-placeholder.sz40.def {
            border-radius: 6px;
        }

        .thumb-placeholder.sz30 {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border-width: 1.5px;
        }

        .thumb-placeholder.sz30.def {
            border-radius: 4px;
        }

        .thumb-placeholder svg {
            width: 60%;
            height: 60%;
        }

        /* Team filter panel */
        #teamFilterPanel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        #teamFilterPanel.open {
            max-height: 420px;
        }

        /* Custom checkbox */
        .team-cb {
            display: none;
        }

        .team-cb-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            color: #94a3b8;
            border: 1px solid transparent;
            transition: all 0.12s;
            white-space: nowrap;
        }

        .team-cb:checked+.team-cb-label {
            color: #F8FAFC;
            background: #1E3A4C;
            border-color: #38BDF8;
        }

        .team-cb-label:hover {
            color: #F8FAFC;
            background: #334155;
        }

        .team-cb-label .cb-box {
            width: 10px;
            height: 10px;
            border: 1.5px solid #475569;
            border-radius: 2px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.12s;
        }

        .team-cb:checked+.team-cb-label .cb-box {
            background: #38BDF8;
            border-color: #38BDF8;
        }

        .cb-check {
            display: none;
        }

        .team-cb:checked+.team-cb-label .cb-check {
            display: block;
        }

        /* Sort toggle */
        .sort-btn {
            transition: all 0.15s;
        }

        .sort-btn.active {
            background: #FB923C;
            color: #0F172A;
        }

        /* Points badge */
        .pts-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            color: #FB923C;
            letter-spacing: -0.02em;
        }
    </style>
</head>

<body class="bg-stadium text-[#e0e3e5] min-h-screen p-6 antialiased">

    <div class="max-w-[1440px] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-6 mb-8 border-b border-surfaceHigh pb-5">
            <div>
                <h1 class="text-4xl md:text-5xl font-normal text-crispWhite tracking-wider">FORTNITOS FANTASY</h1>
                <p id="apiStatus" class="text-skyTechnical uppercase text-xs tracking-widest font-extrabold mt-1">
                    FETCHING 2026-2027 ROSTERS...</p>
            </div>
            <div class="flex flex-wrap items-center gap-4">
                <button id="undoBtn" disabled
                    class="px-5 py-2.5 bg-rose-600 hover:bg-rose-500 text-crispWhite disabled:opacity-30 rounded font-semibold text-sm uppercase tracking-wider transition">Undo</button>
                <form id="userForm" class="flex gap-2">
                    <input id="userNameInput" type="text" placeholder="MANAGER NAME" required
                        class="bg-surfaceDim border border-surfaceHigh px-4 py-2.5 rounded text-sm focus:outline-none focus:border-actionOrange text-crispWhite uppercase font-semibold" />
                    <button type="submit"
                        class="bg-actionOrange hover:bg-amber-400 text-stadium font-extrabold px-5 py-2.5 rounded text-sm uppercase tracking-wider transition">Add
                        Team</button>
                </form>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- LEFT PANEL -->
            <div
                class="lg:col-span-4 xl:col-span-3 bg-surface p-5 rounded-lg border border-surfaceHigh h-[calc(100vh-190px)] flex flex-col gap-3">

                <!-- Title + count -->
                <h2 class="text-xl text-crispWhite flex justify-between items-baseline flex-none">
                    <span>Player Pool</span>
                    <span id="playerCount" class="text-actionOrange stats-font text-lg font-bold">---</span>
                </h2>

                <!-- Name search -->
                <input id="searchInput" type="text" placeholder="Search player name..."
                    class="w-full bg-surfaceDim border border-surfaceHigh px-4 py-2.5 rounded text-sm focus:outline-none focus:border-actionOrange text-crispWhite flex-none" />

                <!-- Position filter -->
                <div class="flex flex-wrap gap-1 flex-none" id="filterContainer">
                    <button data-pos="ALL"
                        class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-actionOrange text-stadium">ALL</button>
                    <button data-pos="QB"
                        class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">QB</button>
                    <button data-pos="RB"
                        class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">RB</button>
                    <button data-pos="WR"
                        class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">WR</button>
                    <button data-pos="TE"
                        class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">TE</button>
                    <button data-pos="K"
                        class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">K</button>
                    <button data-pos="D"
                        class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">D</button>
                    <button data-pos="DEF"
                        class="filter-btn px-2 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh">DEF</button>
                </div>

                <!-- Sort toggle -->
                <div class="flex items-center gap-2 flex-none">
                    <span class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Sort:</span>
                    <button id="sortPts"
                        class="sort-btn active px-3 py-1 rounded text-[10px] font-extrabold bg-actionOrange text-stadium uppercase tracking-wider">⭐
                        Points</button>
                    <button id="sortAZ"
                        class="sort-btn px-3 py-1 rounded text-[10px] font-extrabold bg-surfaceHigh text-slate-300 uppercase tracking-wider">A–Z</button>
                    <span id="statsLoadingBadge" class="text-[9px] text-slate-500 stats-font">loading stats…</span>
                </div>

                <!-- Team filter toggle button -->
                <button id="teamFilterToggle"
                    class="flex-none flex items-center justify-between px-3 py-2 bg-surfaceDim border border-surfaceHigh rounded text-[11px] font-bold text-slate-300 hover:border-skyTechnical hover:text-crispWhite transition">
                    <span>🏈 FILTER BY TEAM</span>
                    <span id="teamFilterCount" class="text-skyTechnical stats-font text-[10px]">ALL 33</span>
                </button>

                <!-- Team filter panel (collapsible) -->
                <div id="teamFilterPanel"
                    class="flex-none bg-surfaceDim rounded border border-surfaceHigh/60 overflow-hidden">
                    <div class="p-2">
                        <!-- Select All / Clear All -->
                        <div class="flex gap-2 mb-2 pb-2 border-b border-surfaceHigh">
                            <button onclick="setAllTeams(true)"
                                class="px-2 py-1 bg-skyTechnical/20 hover:bg-skyTechnical/40 text-skyTechnical text-[9px] font-extrabold rounded uppercase tracking-wider transition">✓
                                All</button>
                            <button onclick="setAllTeams(false)"
                                class="px-2 py-1 bg-rose-900/30 hover:bg-rose-900/60 text-rose-400 text-[9px] font-extrabold rounded uppercase tracking-wider transition">✕
                                Clear</button>
                            <input id="teamSearch" type="text" placeholder="Filter teams..."
                                class="flex-1 bg-surfaceHigh/50 border border-surfaceHigh px-2 py-1 rounded text-[10px] text-crispWhite focus:outline-none focus:border-actionOrange" />
                        </div>
                        <!-- Team grid -->
                        <div id="teamCheckboxGrid"
                            class="grid grid-cols-3 gap-y-0.5 gap-x-1 overflow-y-auto max-h-[280px] pr-1">
                            <!-- injected by JS -->
                        </div>
                    </div>
                </div>

                <!-- Player list -->
                <div id="playerPoolList" class="overflow-y-auto flex-1 pr-1 space-y-2 min-h-0">
                    <div class="loading-shimmer h-14 rounded mb-2"></div>
                    <div class="loading-shimmer h-14 rounded mb-2"></div>
                    <div class="loading-shimmer h-14 rounded mb-2"></div>
                </div>
            </div>

            <!-- RIGHT: Roster grid -->
            <div id="rosterGrid"
                class="lg:col-span-8 xl:col-span-9 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 auto-rows-start overflow-y-auto h-[calc(100vh-190px)] pr-1">
            </div>
        </div>
    </div>

    <script>
        // ─── SVG Silhouettes ──────────────────────────────────────────────────────────
        const SILHOUETTE_PLAYER = `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="13" r="7" fill="#475569"/><path d="M4 38 C4 27 10 22 20 22 C30 22 36 27 36 38Z" fill="#475569"/></svg>`;
        const SILHOUETTE_DEF = `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M20 4 L34 10 L34 21 C34 29 27.5 35.5 20 38 C12.5 35.5 6 29 6 21 L6 10 Z" fill="#334155"/><path d="M20 8 L30 13 L30 21 C30 27.5 25.5 33 20 35 C14.5 33 10 27.5 10 21 L10 13 Z" fill="#38BDF8" opacity="0.5"/><text x="20" y="25" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#38BDF8" opacity="0.9">DEF</text></svg>`;

        function swapToSilhouette(imgEl, isDef) {
            imgEl.style.display = 'none';
            imgEl.parentElement.innerHTML = isDef ? SILHOUETTE_DEF : SILHOUETTE_PLAYER;
            imgEl.onerror = null;
        }

        function teamLogoUrl(team) {
            const t = team.toLowerCase();
            const espnMap = { lar: 'ram', lac: 'lac', sf: 'sf', tb: 'tb', gb: 'gb', kc: 'kc', ne: 'ne', no: 'no', nyg: 'nyg', nyj: 'nyj', lv: 'lv' };
            return `https://a.espncdn.com/i/teamlogos/nfl/500/${espnMap[t] || t}.png`;
        }
        function playerThumbUrl(id) { return `https://sleepercdn.com/content/nfl/players/thumb/${id}.jpg`; }

        function thumbHTML(player, size = 40, forRoster = false) {
            const isDef = player.pos === 'DEF';
            const szClass = size === 40 ? 'sz40' : 'sz30';
            const defClass = isDef ? ' def' : '';
            const borderR = isDef ? (size === 40 ? '6px' : '4px') : '50%';
            const border = forRoster ? '1.5px solid #334155' : '2px solid #334155';
            const url = isDef ? teamLogoUrl(player.team) : playerThumbUrl(player.id);
            return `<span class="thumb-placeholder ${szClass}${defClass}" style="border-radius:${borderR};border:${border};">
        <img src="${url}" style="width:100%;height:100%;object-fit:cover;object-position:${isDef ? 'center' : 'top center'};border-radius:inherit;display:block;"
             alt="${player.name}" onerror="swapToSilhouette(this,${isDef})" loading="lazy"/>
    </span>`;
        }

        // ─── All 32 NFL Teams (grouped by conf/div for display) ───────────────────────
        const NFL_TEAMS = [
            // AFC
            'BUF', 'MIA', 'NE', 'NYJ',
            'BAL', 'CIN', 'CLE', 'PIT',
            'HOU', 'IND', 'JAX', 'TEN',
            'DEN', 'KC', 'LV', 'LAC',
            // NFC
            'DAL', 'NYG', 'PHI', 'WAS',
            'CHI', 'DET', 'GB', 'MIN',
            'ATL', 'CAR', 'NO', 'TB',
            'ARI', 'LAR', 'SEA', 'SF',
        ];
        const CONF_LABELS = { BUF: 'AFC East', MIA: 'AFC East', NE: 'AFC East', NYJ: 'AFC East', BAL: 'AFC North', CIN: 'AFC North', CLE: 'AFC North', PIT: 'AFC North', HOU: 'AFC South', IND: 'AFC South', JAX: 'AFC South', TEN: 'AFC South', DEN: 'AFC West', KC: 'AFC West', LV: 'AFC West', LAC: 'AFC West', DAL: 'NFC East', NYG: 'NFC East', PHI: 'NFC East', WAS: 'NFC East', CHI: 'NFC North', DET: 'NFC North', GB: 'NFC North', MIN: 'NFC North', ATL: 'NFC South', CAR: 'NFC South', NO: 'NFC South', TB: 'NFC South', ARI: 'NFC West', LAR: 'NFC West', SEA: 'NFC West', SF: 'NFC West' };

        // State
        let isMobile = window.innerWidth < 1024;
        window.addEventListener('resize', () => { isMobile = window.innerWidth < 1024; renderAll(); });

        let players = [];
        let seasonStats = {};      // playerId -> pts_ppr (2025 season totals)
        let statsLoaded = false;
        let users = [{ id: Date.now(), name: "INITIAL MANAGER", roster: [] }];
        let history = [];
        let currentFilter = "ALL";
        let currentSearch = "";
        let sortMode = "pts";      // "pts" | "az"
        let selectedTeams = new Set([...NFL_TEAMS, 'FA']); // all checked by default
        let teamFilterOpen = false;

        const poolList = document.getElementById('playerPoolList');
        const rosterGrid = document.getElementById('rosterGrid');
        const statusText = document.getElementById('apiStatus');

        // ─── Build team checkbox grid ─────────────────────────────────────────────────
        function buildTeamCheckboxes() {
            const grid = document.getElementById('teamCheckboxGrid');
            grid.innerHTML = '';

            // Group by division label for visual dividers
            let lastDiv = null;
            const allTeamsWithFA = [...NFL_TEAMS, 'FA'];

            allTeamsWithFA.forEach(team => {
                const div = CONF_LABELS[team] || 'Free Agents';
                if (div !== lastDiv) {
                    lastDiv = div;
                    const divider = document.createElement('div');
                    divider.className = 'col-span-3 text-[8px] font-extrabold text-slate-600 uppercase tracking-widest pt-1.5 pb-0.5';
                    divider.textContent = div;
                    grid.appendChild(divider);
                }
                const id = `tcb-${team}`;
                const wrapper = document.createElement('div');
                wrapper.innerHTML = `
            <input type="checkbox" class="team-cb" id="${id}" data-team="${team}" ${selectedTeams.has(team) ? 'checked' : ''}>
            <label for="${id}" class="team-cb-label">
                <span class="cb-box"><svg class="cb-check" width="8" height="8" viewBox="0 0 8 8"><path d="M1 4L3 6L7 2" stroke="#0F172A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                ${team}
            </label>`;
                grid.appendChild(wrapper.firstElementChild);
                grid.appendChild(wrapper.lastElementChild);
            });

            // Listen to changes
            grid.querySelectorAll('.team-cb').forEach(cb => {
                cb.addEventListener('change', () => {
                    if (cb.checked) selectedTeams.add(cb.dataset.team);
                    else selectedTeams.delete(cb.dataset.team);
                    updateTeamFilterCount();
                    renderPlayers();
                });
            });
        }

        function updateTeamFilterCount() {
            const total = NFL_TEAMS.length + 1; // +FA
            const count = selectedTeams.size;
            document.getElementById('teamFilterCount').textContent = count === total ? 'ALL 33' : `${count} / ${total}`;
        }

        function setAllTeams(checked) {
            selectedTeams = checked ? new Set([...NFL_TEAMS, 'FA']) : new Set();
            document.querySelectorAll('.team-cb').forEach(cb => {
                cb.checked = checked;
                if (checked) selectedTeams.add(cb.dataset.team);
            });
            updateTeamFilterCount();
            renderPlayers();
        }

        // Team search filter
        document.getElementById('teamSearch').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('.team-cb, .team-cb-label').forEach(el => {
                const team = el.dataset?.team || el.getAttribute('for')?.replace('tcb-', '');
                if (!team) return;
                const show = !q || team.toLowerCase().includes(q);
                el.style.display = show ? '' : 'none';
            });
        });

        // Toggle panel
        document.getElementById('teamFilterToggle').addEventListener('click', () => {
            teamFilterOpen = !teamFilterOpen;
            document.getElementById('teamFilterPanel').classList.toggle('open', teamFilterOpen);
            document.getElementById('teamFilterToggle').classList.toggle('border-skyTechnical', teamFilterOpen);
        });

        // ─── Sort buttons ─────────────────────────────────────────────────────────────
        document.getElementById('sortPts').addEventListener('click', () => {
            sortMode = 'pts';
            document.getElementById('sortPts').classList.add('active');
            document.getElementById('sortAZ').classList.remove('active');
            renderPlayers();
        });
        document.getElementById('sortAZ').addEventListener('click', () => {
            sortMode = 'az';
            document.getElementById('sortAZ').classList.add('active');
            document.getElementById('sortPts').classList.remove('active');
            renderPlayers();
        });

        // ─── Data load ────────────────────────────────────────────────────────────────
        async function load2026Data() {
            // Load players + stats in parallel
            const [playersRes, statsRes] = await Promise.allSettled([
                fetch('https://api.sleeper.app/v1/players/nfl'),
                fetch('https://api.sleeper.app/v1/stats/nfl/regular/2025/0') // season totals
            ]);

            // Process players
            if (playersRes.status === 'fulfilled') {
                const data = await playersRes.value.json();
                const corePositions = ["QB", "RB", "WR", "TE", "K", "DEF"];
                const idpPositions = ["DL", "LB", "DB", "CB", "S", "ILB", "OLB", "DE", "DT"];
                players = Object.values(data)
                    .filter(p => p.active && (corePositions.includes(p.position) || idpPositions.includes(p.position)))
                    .map(p => ({
                        id: p.player_id,
                        name: p.full_name || `${p.first_name} ${p.last_name}`,
                        pos: idpPositions.includes(p.position) ? "D" : p.position,
                        team: p.team || "FA",
                        search_rank: p.search_rank || 9999
                    }));
                statusText.innerText = "2026-2027 SYSTEM READY // LIVE DATA SYNCED";
                statusText.classList.replace('text-skyTechnical', 'text-emerald-400');
            } else {
                statusText.innerText = "CONNECTION ERROR // USING OFFLINE CACHE";
                statusText.classList.replace('text-skyTechnical', 'text-rose-500');
            }

            // Process season stats
            if (statsRes.status === 'fulfilled') {
                try {
                    const statsData = await statsRes.value.json();
                    // statsData: { player_id: { pts_ppr, pts_std, pts_half_ppr, ... } }
                    Object.entries(statsData).forEach(([pid, s]) => {
                        if (s && (s.pts_ppr || s.pts_half_ppr || s.pts_std)) {
                            seasonStats[pid] = s.pts_ppr || s.pts_half_ppr || s.pts_std || 0;
                        }
                    });
                    statsLoaded = true;
                    document.getElementById('statsLoadingBadge').textContent = '2025 season pts';
                    document.getElementById('statsLoadingBadge').style.color = '#34d399';
                } catch (e) {
                    document.getElementById('statsLoadingBadge').textContent = 'stats unavailable';
                }
            } else {
                document.getElementById('statsLoadingBadge').textContent = 'using rank order';
            }

            buildTeamCheckboxes();
            renderAll();
        }

        function getPlayerScore(p) {
            if (statsLoaded && seasonStats[p.id] !== undefined) return seasonStats[p.id];
            // Fallback: invert search_rank so higher = better
            return p.search_rank ? (10000 - p.search_rank) : 0;
        }

        function renderAll() { renderPlayers(); renderRosters(); }

        function renderPlayers() {
            poolList.innerHTML = '';
            let filtered = players.filter(p => {
                const nameMatch = p.name.toLowerCase().includes(currentSearch);
                const posMatch = currentFilter === "ALL" || p.pos === currentFilter;
                const teamKey = p.team === 'FA' || !p.team ? 'FA' : p.team;
                const teamMatch = selectedTeams.has(teamKey);
                return nameMatch && posMatch && teamMatch;
            });

            // Sort
            if (sortMode === 'pts') {
                filtered.sort((a, b) => getPlayerScore(b) - getPlayerScore(a));
            } else {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            }

            document.getElementById('playerCount').textContent = `(${filtered.length}/${players.length})`;

            filtered.slice(0, 120).forEach(p => {
                const pts = seasonStats[p.id];
                const ptsLabel = pts ? `<span class="pts-badge">${pts.toFixed(0)} pts</span>` : '';
                const card = document.createElement('div');
                card.className = "bg-surface p-2.5 rounded border border-surfaceHigh/60 flex items-center gap-3 group transition active:bg-surfaceHigh";
                if (!isMobile) {
                    card.draggable = true;
                    card.classList.add('cursor-grab');
                    card.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', p.id));
                }
                card.innerHTML = `
            ${thumbHTML(p, 40)}
            <div class="flex-1 min-w-0">
                <span class="font-semibold block text-crispWhite text-sm truncate">${p.name}</span>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-slate-400 stats-font uppercase tracking-widest">${p.team}</span>
                    ${ptsLabel}
                </div>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
                <span class="text-[10px] font-extrabold px-2 py-1 bg-skyTechnical text-stadium stats-font">${p.pos}</span>
                ${isMobile ? `<button onclick="showMobilePicker('${p.id}')" class="w-10 h-10 flex items-center justify-center bg-actionOrange text-stadium rounded-full shadow-lg"><span class="text-xl font-bold">+</span></button>` : ''}
            </div>
        `;
                poolList.appendChild(card);
            });

            if (filtered.length > 120) {
                const more = document.createElement('div');
                more.className = "text-center text-[10px] text-slate-600 py-2 stats-font";
                more.textContent = `+ ${filtered.length - 120} more — use filters to narrow`;
                poolList.appendChild(more);
            }
        }

        function showMobilePicker(playerId) {
            const player = players.find(p => p.id === playerId);
            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 bg-stadium/90 backdrop-blur-sm z-[100] flex flex-col p-6 items-center justify-center";
            overlay.id = "mobilePicker";
            overlay.innerHTML = `
        <div class="w-full max-w-sm bg-surface p-6 rounded-xl border border-actionOrange shadow-2xl">
            <div class="flex items-center gap-4 mb-4">
                ${thumbHTML(player, 40)}
                <div>
                    <h3 class="text-xl text-crispWhite">Draft ${player.name}</h3>
                    <p class="text-xs text-slate-400 uppercase tracking-widest">${player.pos} · ${player.team}</p>
                </div>
            </div>
            <p class="text-xs text-slate-400 uppercase tracking-widest mb-4">Select Destination Manager</p>
            <div class="space-y-3 max-h-[60vh] overflow-y-auto">
                ${users.map(u => `<button onclick="mobileDraft('${player.id}',${u.id})" class="w-full p-4 bg-surfaceHigh text-crispWhite font-bold rounded-lg text-left hover:bg-actionOrange hover:text-stadium transition">${u.name}</button>`).join('')}
            </div>
            <button onclick="document.getElementById('mobilePicker').remove()" class="w-full mt-6 py-3 text-rose-500 font-bold uppercase tracking-widest">Cancel</button>
        </div>`;
            document.body.appendChild(overlay);
        }

        function mobileDraft(playerId, userId) {
            const idx = players.findIndex(p => p.id === playerId);
            if (idx !== -1) {
                saveHistory();
                const [player] = players.splice(idx, 1);
                users.find(u => u.id === userId).roster.push(player);
                document.getElementById('mobilePicker').remove();
                renderAll();
            }
        }

        function renderRosters() {
            rosterGrid.innerHTML = '';
            users.forEach(user => {
                const zone = document.createElement('div');
                zone.className = "bg-surface/40 border-2 border-dashed border-surfaceHigh/80 rounded-lg p-4 flex flex-col h-full min-h-[350px]";
                zone.innerHTML = `
            <div class="border-b border-surfaceHigh/80 pb-2 mb-3 flex justify-between items-start flex-none">
                <div>
                    <h3 class="text-lg text-crispWhite">${user.name}</h3>
                    <button onclick="editUser(${user.id})" class="text-[9px] font-bold text-skyTechnical uppercase">Edit Name</button>
                </div>
                ${users.length > 1 ? `<button onclick="removeUser(${user.id})" class="text-rose-500 text-[9px] font-bold uppercase">Delete</button>` : ''}
            </div>
            <div class="space-y-1.5 overflow-y-auto pr-1 flex-1 max-h-[300px]"
                ondragover="event.preventDefault()" ondrop="handleDrop(event,${user.id})">
                ${user.roster.map(p => `
                    <div class="bg-surface px-2.5 py-1.5 rounded border border-surfaceHigh/50 flex items-center gap-2 text-xs group">
                        ${thumbHTML(p, 30, true)}
                        <span class="text-crispWhite font-semibold flex-1 truncate">${p.name}</span>
                        <div class="flex items-center gap-1.5 flex-shrink-0">
                            ${seasonStats[p.id] ? `<span class="pts-badge">${seasonStats[p.id].toFixed(0)}</span>` : ''}
                            <span class="stats-font text-skyTechnical font-bold text-[10px]">${p.pos}</span>
                            <button onclick="releasePlayer(${user.id},'${p.id}')" class="opacity-0 group-hover:opacity-100 text-rose-500 font-bold transition">✕</button>
                        </div>
                    </div>
                `).join('') || '<div class="h-32 flex items-center justify-center text-slate-700 text-[10px] uppercase font-bold text-center">Drag Player to Field</div>'}
            </div>
            <div class="mt-3 pt-2 border-t border-surfaceHigh/40 flex-none">
                <span class="text-[10px] font-bold text-actionOrange stats-font uppercase">${user.roster.length} Assets Drafted</span>
            </div>`;
                rosterGrid.appendChild(zone);
            });
        }

        function handleDrop(e, userId) {
            e.preventDefault();
            const pid = e.dataTransfer.getData('text/plain');
            const idx = players.findIndex(p => p.id === pid);
            if (idx !== -1) {
                saveHistory();
                const [player] = players.splice(idx, 1);
                users.find(u => u.id === userId).roster.push(player);
                renderAll();
            }
        }

        function releasePlayer(userId, playerId) {
            saveHistory();
            const user = users.find(u => u.id === userId);
            const idx = user.roster.findIndex(p => p.id === playerId);
            const [player] = user.roster.splice(idx, 1);
            players.push(player);
            renderAll();
        }

        function saveHistory() {
            history.push({ players: JSON.parse(JSON.stringify(players)), users: JSON.parse(JSON.stringify(users)) });
            document.getElementById('undoBtn').disabled = false;
        }

        function editUser(id) {
            const user = users.find(u => u.id === id);
            const n = prompt("Enter new name:", user.name);
            if (n && n.trim()) { saveHistory(); user.name = n.trim().toUpperCase(); renderAll(); }
        }

        function removeUser(id) {
            if (users.length <= 1) return;
            if (confirm("Remove manager? Their players return to pool.")) {
                saveHistory();
                const [rem] = users.splice(users.findIndex(u => u.id === id), 1);
                players = [...players, ...rem.roster];
                renderAll();
            }
        }

        document.getElementById('userForm').addEventListener('submit', e => {
            e.preventDefault();
            const val = document.getElementById('userNameInput').value.trim().toUpperCase();
            if (val) {
                saveHistory();
                users.push({ id: Date.now(), name: val, roster: [] });
                document.getElementById('userNameInput').value = '';
                renderAll();
            }
        });

        document.getElementById('searchInput').addEventListener('input', e => {
            currentSearch = e.target.value.toLowerCase();
            renderPlayers();
        });

        document.getElementById('filterContainer').addEventListener('click', e => {
            if (e.target.dataset.pos) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.replace('bg-actionOrange', 'bg-surfaceHigh'));
                e.target.classList.replace('bg-surfaceHigh', 'bg-actionOrange');
                e.target.classList.add('text-stadium');
                currentFilter = e.target.dataset.pos;
                renderPlayers();
            }
        });

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (history.length > 0) {
                const prev = history.pop();
                players = prev.players; users = prev.users;
                if (history.length === 0) document.getElementById('undoBtn').disabled = true;
                renderAll();
            }
        });

        load2026Data();
    </script>
</body>

</html>
